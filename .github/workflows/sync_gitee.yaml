# Description : CI/CD - 同步代码到 Gitee

name: Sync Gitee

on:
  push:
    branches:
      - main
    tags:
      - "*"

  # build.yaml 完成后自动触发
  workflow_run:
    workflows: ["Build Dist And Tag"]
    types:
      - completed

  # 手动触发
  workflow_dispatch:

concurrency:
  group: blog-tool-ci
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_PRIVATE_KEY }}

      - name: Add Gitee host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa gitee.com >> ~/.ssh/known_hosts

      - name: Push to Gitee
        run: |
          git remote add gitee git@gitee.com:jiaopengzi/blog-tool.git
          # 确保本地获取到远端 refs，这样 --force-with-lease 才能正确检测是否安全覆盖
          git fetch gitee main --tags || true
          # 先安全地强制推送分支，再单独推送 tags
          git push --force-with-lease gitee main
          git push gitee --tags
